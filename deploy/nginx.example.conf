# Example nginx reverse proxy for Meet clone (bandr monorepo).
#
# === Server packages (Ubuntu 22.04+ example) ===
#   sudo apt update
#   sudo apt install -y nginx certbot python3-certbot-nginx
#   # Node 20 (use NodeSource or nvm — pick one)
#   curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
#   sudo apt install -y nodejs
#   sudo apt install -y postgresql redis-server
#
# === Node app (after git clone on server) ===
#   cd /var/www/bandr   # your deploy path
#   npm ci
#   npm run build
#   # Set DATABASE_URL, JWT_SECRET, REDIS_URL, NODE_ENV=production in apps/api/.env and apps/signaling/.env
#   # Bind Node to 127.0.0.1 only; nginx terminates TLS.
#   HOST=127.0.0.1 PORT=4001  (api)   HOST=127.0.0.1 PORT=4002  (signaling)
#   SIGNALING_URL=http://127.0.0.1:4002  (api server-side health check; no TLS inside loopback)
#   npm run db:migrate -w @bandr/db
#   pm2 start deploy/pm2.ecosystem.example.cjs   # or systemd (see comments below)
#
# === TLS ===
#   sudo certbot --nginx -d video.upliftsolutions.com.np
#   (DNS A/AAAA for video.upliftsolutions.com.np must point to this server first.)
#
# === Install this file ===
#   sudo cp deploy/nginx.example.conf /etc/nginx/sites-available/video-upliftsolutions
#   sudo ln -s /etc/nginx/sites-available/video-upliftsolutions /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS (certbot usually adds this; shown for clarity)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name video.upliftsolutions.com.np;
#     return 301 https://$host$request_uri;
# }

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name video.upliftsolutions.com.np;

    # certbot paths after: certbot --nginx -d video.upliftsolutions.com.np
    ssl_certificate     /etc/letsencrypt/live/video.upliftsolutions.com.np/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/video.upliftsolutions.com.np/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    # API + static HTML/JS/CSS (Express on 4001)
    location / {
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Socket.io (signaling server on 4002) — same public host, path /socket.io/
    location /socket.io/ {
        proxy_pass http://127.0.0.1:4002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }
}
